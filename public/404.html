<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Portfolio - Priyanshu Singh</title>
  <script>
    // This script handles the GitHub Pages 404 redirect for single-page apps
    // Store the original path so we can navigate to it after the page loads
    var pathSegments = location.pathname.split('/').slice(1, -1);
    sessionStorage.redirect = '/' + pathSegments.join('/');
  </script>
  <meta http-equiv="refresh" content="0;url=/Portfolio-/" />
</head>
<body>
  <p>If you are not redirected, <a href="/Portfolio-/">click here</a></p>
</body>
</html>
